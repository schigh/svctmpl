name: layered-http
description: HTTP service with hexagonal architecture, chi router, and modular app bootstrapping
files:
  - path: cmd/app/main.go.tmpl
    output: cmd/app/main.go
  - path: internal/app/app.go.tmpl
    output: internal/app/app.go
  - path: internal/app/database.go.tmpl
    output: internal/app/database.go
    requires: [database]
  - path: internal/app/otel.go.tmpl
    output: internal/app/otel.go
    requires: [observability]
  - path: internal/app/server.go.tmpl
    output: internal/app/server.go
  - path: internal/config/config.go.tmpl
    output: internal/config/config.go
  - path: internal/errs/errors.go.tmpl
    output: internal/errs/errors.go
  - path: internal/log/log.go.tmpl
    output: internal/log/log.go
  - path: internal/model/resource.go.tmpl
    output: internal/model/resource.go
  - path: internal/repository/resource.go.tmpl
    output: internal/repository/resource.go
    requires: [database]
  - path: internal/repository/queries.sql.tmpl
    output: internal/repository/queries.sql
    requires: [database, "db_tooling:sqlc"]
  - path: internal/service/repository.go.tmpl
    output: internal/service/repository.go
  - path: internal/service/resource.go.tmpl
    output: internal/service/resource.go
  - path: internal/transport/http/handler.go.tmpl
    output: internal/transport/http/handler.go
  - path: internal/transport/http/resource.go.tmpl
    output: internal/transport/http/resource.go
  - path: internal/transport/http/errors.go.tmpl
    output: internal/transport/http/errors.go
  - path: internal/transport/http/health.go.tmpl
    output: internal/transport/http/health.go
  - path: internal/transport/http/middleware.go.tmpl
    output: internal/transport/http/middleware.go
  - path: internal/transport/http/handler_test.go.tmpl
    output: internal/transport/http/handler_test.go
  - path: internal/transport/http/resource_test.go.tmpl
    output: internal/transport/http/resource_test.go
  - path: migrations/001_create_resources.sql.tmpl
    output: migrations/001_create_resources.sql
    requires: [database]
  - path: sqlc.yaml.tmpl
    output: sqlc.yaml
    requires: [database, "db_tooling:sqlc"]
  - path: Dockerfile.tmpl
    output: Dockerfile
    requires: [container]
  - path: Makefile.tmpl
    output: Makefile
  - path: .github/workflows/ci.yml.tmpl
    output: .github/workflows/ci.yml
    requires: ["ci:github-actions"]
  - path: go.mod.tmpl
    output: go.mod
  - path: .env.example.tmpl
    output: .env.example
  - path: .gitignore.tmpl
    output: .gitignore
  - path: README.md.tmpl
    output: README.md
