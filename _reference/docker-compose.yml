# Docker Compose configuration for myservice local development.
#
# Usage:
#   docker compose up -d        # start all services
#   docker compose logs -f app  # follow app logs
#   docker compose down -v      # tear down, removing volumes
#
# The postgres service runs the migrations on first boot via the
# docker-entrypoint-initdb.d mount. The app waits for postgres to be
# healthy before starting.

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL — primary data store
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: myservice
    ports:
      - "5432:5432"
    volumes:
      # Seed the database with the migration SQL on first start.
      - ./migrations:/docker-entrypoint-initdb.d/:ro
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d myservice"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ---------------------------------------------------------------------------
  # Application — the Go service
  # ---------------------------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SERVICE_NAME: myservice
      SERVICE_ENV: dev
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: myservice
      DB_SSLMODE: disable
      DB_MAX_CONNS: "10"
      HTTP_PORT: "8080"
      OTEL_ENABLED: "true"
      OTEL_SERVICE_NAME: myservice
      OTEL_METRICS_PORT: "9090"
      # Point the OTLP exporter at the collector.
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
    ports:
      - "8080:8080"
      - "9090:9090"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/healthz || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  # ---------------------------------------------------------------------------
  # OpenTelemetry Collector — receives OTLP, exports to Prometheus
  # ---------------------------------------------------------------------------
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    volumes:
      - ./deploy/otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP

  # ---------------------------------------------------------------------------
  # Prometheus — metrics scraping and storage
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:latest
    depends_on:
      - app
    volumes:
      - ./deploy/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9091:9090"

  # ---------------------------------------------------------------------------
  # Grafana — dashboards and visualization
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:latest
    depends_on:
      - prometheus
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    volumes:
      - ./deploy/grafana/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
    ports:
      - "3000:3000"

volumes:
  pgdata:
